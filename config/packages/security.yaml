security:

    password_hashers:
        # auto hasher with default options for the User class (and children)
        App\Entity\User: 'auto'

        # auto hasher with custom options for all PasswordAuthenticatedUserInterface instances
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
            algorithm: 'auto'
            cost:      15
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username
    firewalls:
        login:
            pattern: ^/api/login
            stateless: true
            form_login:
                check_path: /api/login_check
                username_parameter: username
                password_parameter: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            # Matches all other URLs
            lazy: true
            # provider: your_user_provider # uncomment and configure if you have a user provider

            # Optionally, enable anonymous access for pages that don't require login
            # anonymous: ~
            
            # Add other authentication methods if needed, e.g., form_login or http_basic
            # form_login:
            #     login_path: app_login
            #     check_path: app_login
            #     # ... other form login options
            
            # logout:
            #     path: app_logout
            #     target: app_homepage